owner:
  name: Tanishq
  city: Indore
  languages: [en, hi, hinglish]

models:
  daily:
    provider: ollama
    model: qwen3.5:9b-q4_K_M            # verified tag (no -instruct variant published)
    num_ctx: 8192
    temperature: 0.7
    keep_alive: 24h
  heavy:
    provider: ollama
    model: qwen3.6:35b-a3b              # library tag verified 2026-07-04 (24 GB MoE)
    num_ctx: 8192
    temperature: 0.5
    keep_alive: 10m
    min_free_ram_gb: 22
  cloud:
    provider: gemini
    model: gemini-flash-latest          # free tier; key in .env; optional
  nim_primary:
    provider: nvidia
    base_url: https://integrate.api.nvidia.com/v1
    model: minimaxai/minimax-m2.7       # N1 bench winner (Tanishq, 2026-07-06): tools 100%, 1.4s first token
    temperature: 0.7
  nim_heavy:
    provider: nvidia
    base_url: https://integrate.api.nvidia.com/v1
    model: z-ai/glm-5.2                 # N1 bench winner (heavy): planning 5/5; slow (~130s) but background-only
    temperature: 0.5
  embedder: intfloat/multilingual-e5-small

router:
  mode: local_primary                   # cloud_primary | local_primary ← rollback switch (flips in N2)
  default: daily
  escalate_on: [explicit_request, planning_task, retry_after_failure, long_context]
  escalation_order: [heavy, cloud]
  long_context_tokens: 4096             # above this → cloud (heavy shares the global 8K ctx)
  # cloud_primary keys (inert until Phase N2 router v2 lands):
  primary: nim_primary
  heavy: nim_heavy
  offline_fallback: daily
  backstop: cloud
  local_keep_warm: true
  first_token_timeout_s: {voice: 3.5, text: 8}
  health: {probe_s: 45, recover_after: 3, cooldown_429_s: 90}
  rate_limit: {rpm: 36, background_share: 0.5}
  privacy_pins: [read_file, run_shell]
  language_pin: {enabled: true, devanagari_ratio: 0.3, target: daily}

game_mode:
  enabled: true                         # NIM plan §2.5: unload local 9B, route all cloud
  auto_detect: false                    # fullscreen-exclusive detection (off by default)

voice:
  enabled: true
  wakeword_model: models/hey_baby.onnx  # trained on Colab; scripts/wakeword_training.md
  wakeword_builtin_fallback: hey_jarvis # interim until hey_baby.onnx lands
  wakeword_threshold: 0.55
  push_to_talk_hotkey: ctrl+alt+b
  kill_phrases: ["baby stop", "baby ruk ja"]
  max_utterance_s: 30
  stt:
    model: large-v3-turbo               # 'small' = 4x faster, worse Hindi (DECISIONS)
    device: cpu                         # GPU is fully owned by the 9B LLM (DECISIONS)
    compute_type: int8
    cpu_threads: 8
    beam_size: 1
    # Decoder bias for names Whisper mishears with an Indian accent
    hotwords: "Baby, Ollama, Chromium, Telegram, Gemini, qwen, Spotify, WhatsApp, YouTube, Indore, lakh, crore"
  tts:
    engine: kokoro-onnx                 # official kokoro pip pins <3.13 (DECISIONS)
    model: models/kokoro-v1.0.onnx
    voices: models/voices-v1.0.bin
    voice_en: af_heart                  # grade A per Kokoro VOICES.md
    voice_hi: hf_beta                   # A/B against hf_alpha by ear
    speed: 1.05
  vad_silence_ms: 400
  vad_speech_wait_ms: 5000              # grace to start talking after the beep
  speaker_verify:
    enabled: true                       # fail-soft off while models/owner_voice.json is missing
    model: models/wespeaker_en_voxceleb_CAM++.onnx
    profile: models/owner_voice.json
    threshold: 0.5                      # tune from enroll_voice.py printed stats
    mode: chat_only                     # chat_only | ignore (unknown voices)
  barge_in: true
  barge_in_threshold: 0.6               # raise if speaker echo self-triggers
  ready_announce:
    enabled: true
    phrase: "Baby ready"
    sound_file: assets/baby_ready.wav
    min_interval_s: 60

ui:
  host: 127.0.0.1
  port: 8765

startup:
  wait_for_model_s: 120                 # logon race: wait for Ollama before giving up

search:
  engine: ddg                           # ddg | brave | searxng
  max_results: 6

memory:
  k: 5                                  # facts injected per turn
  min_similarity: 0.80                  # e5 scores cluster high; tune with real facts
  dedup_similarity: 0.90                # spec section 12
  summarize_every: 10                   # messages between rolling-summary updates
  extract_every: 20                     # messages between fact-extraction passes
  keep_recent: 10                       # newest messages never folded into summary

persona:
  suggest_next_step: true               # feature #8: extra call after a real task

files:
  everything_dll: ""                    # optional explicit DLL path; default resolution otherwise
  index_ttl_hours: 24                   # scandir fallback index freshness

safety:
  mode: enforce                         # enforce | dry_run
  auto_allow_app_close: [chrome, msedge, notepad, spotify, vlc]
  confirm_timeout_s: 60                 # unanswered confirmation = NO

workers:
  size: 2                               # background task concurrency (spec §15)
  max_iterations: 15                    # tool-step budget per background task

multi_agent:
  enabled: true                         # feature #9: orchestrator over the tasks board
  max_subtasks: 4                       # small local models compound errors — keep chains short
  project_timeout_s: 1800
  plan_max_tokens: 1500

screen:
  enabled: true                         # feature +screen: "what's on my screen?"
  model: ""                             # "" = daily multimodal 9B (no eviction); qwen3-vl:2b-instruct = dedicated
  all_screens: false                    # primary monitor only by default
  max_side: 1280                        # longest side after downscale (token budget)
  jpeg_quality: 80
  allow_cloud_fallback: true            # Gemini ONLY when local vision fails (screenshots may hold secrets)

browser:
  headless: false                       # visible window (owner choice — easier logins)
  profile_dir: ""                       # default %LOCALAPPDATA%/baby/browser

telegram:
  enabled: false

tray:
  enabled: true                         # status dot: green ready, amber busy, red confirm

briefing:
  enabled: true                         # Phase 4: 08:00 local + 1h wake grace
  cron: "0 8 * * *"
  include: [date, weather, pending_tasks, headlines, system_health]
