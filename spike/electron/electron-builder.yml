# V0 shell spike — minimal electron-builder config, only to measure installer /
# packaged size for the shell comparison. Not a shipping config.
appId: com.baby.spike.electron
productName: BabySpikeElectron
directories:
  output: release
files:
  - dist/**
  - dist-electron/**
  - package.json
win:
  target:
    - nsis
nsis:
  oneClick: true
  perMachine: false
